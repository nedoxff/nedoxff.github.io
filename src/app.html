<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />

		<script>
			localStorage.theme === 'dark' ||
			(!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)
				? document.documentElement.classList.add('dark')
				: document.documentElement.classList.remove('dark');

			const titles = ['website', 'dumpster fire', 'mess', 'web page', 'page', 'undefined'];
			const index = (Math.random() * titles.length) << 0;
			document.title = `nedo's ${titles[index]}`;
		</script>

		<link rel="stylesheet" href="https://rsms.me/inter/inter.css" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Bitter:wght@200..700&display=swap"
		/>
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=JetBrains Mono:wght@200..700&display=swap"
		/>

		<meta name="viewport" content="width=device-width, initial-scale=1" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-light dark:bg-dark">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
