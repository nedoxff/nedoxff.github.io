<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="https://code.jquery.com/jquery-3.6.2.min.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/code.js"></script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link id="gruvbox-theme-link" rel="stylesheet">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/general.css">
    
    <title>nedoxff's website</title>
    
    <style>
        #main-text, .card-title, .card-description {
            color: var(--fg);
        }
        
        .card {
            background-color: var(--bg_s);
            min-width: 100%;
            height: fit-content;
            border-radius: 15px;
            margin-top: 15px;
        }
        
        .card-content {
            padding: 15px;
            display: flex;
            flex-direction: row;
        }
        
        .card-img-link:hover {
            cursor: zoom-in;
        }
        
        .card-img-link {
            min-width: 25%;
            max-width: 25%;
        }
        
        .card-img {
            max-width: 100%;
            border-radius: 5px;
        }
        
        .card-title, .card-description, .card-data-loading {
            margin: 0;
        }
        
        .card-title {
            overflow-wrap: anywhere;
        }
    </style>
</head>
<body>
<button id="toggle-theme-button"><i class="material-icons" id="toggle-theme-icon">brightness_low</i></button>
<div id="content-wrapper">
    <div id="content-div">
        
        <div style="min-width: 0; flex-wrap: wrap; display: flex; flex-direction: row; align-items: baseline;">
            <a href="/" style="text-decoration: none"><h1 id="nickname-text">nedoxff</h1></a>
            <a class="section-button" href="/info"><h3>info</h3></a>
            <a class="selected-section"><h3>code</h3></a>
            <a class="section-button" href="/art"><h3>art</h3></a>
            <a class="section-button" href="https://www.youtube.com/watch?v=dQw4w9WgXcQ"><h3>other</h3></a>
        </div>
        <hr style="height: 1px; background-color: var(--fg); color: var(--fg);">
        <h3 id="main-text">my main language is C#, but i also use js, python and c++ in day to day life.<br>here are some of my projects:</h3>
        <div class="card-container">
            
        </div>
        <h3 class="headline-text">or just check <a style="color: var(--fg)" href="https://github.com/nedoxff">my github!</a></h3>
    </div>
</div>
</body>
</html>
