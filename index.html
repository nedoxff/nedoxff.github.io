<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link id="gruvbox-theme-link" rel="stylesheet" href="css/gruvbox.css">
    <link rel="stylesheet" href="css/fonts.css">
    <script src="https://code.jquery.com/jquery-3.6.2.min.js"></script>
    
    <title>nedoxff's website</title>
    
    <style>
        body {
            background-color: var(--bg);
        }

        @media (max-width: 500px) {
            #content-div
            {
                width: 100% !important;
            }
        }
        
        #toggle-theme-button
        {
            border-radius: 50px;
            background: var(--fg);
            border: none;
            height: 2.5rem;
            position: absolute;
            bottom: 15px;
            right: 15px;
        }
        
        #toggle-theme-button:hover {
            cursor: pointer;
        }
        
        #toggle-theme-icon
        {
            color: var(--bg_h); 
            vertical-align: middle;
            font-size: 2rem;
        }
        
        #content-div
        {
            width: 50vw;
            padding: 15px;
        }
        
        #nickname-text, #introduction, .section-button {
            font-family: fira,sans-serif;
        }
        
        #nickname-text, .section-button {
            color: var(--yellow);
        }
        
        #nickname-text, .section-button > h3 {
            margin: 0;
        }
        
        .section-button {
            margin-left: 15px;
            text-decoration-color: var(--yellow);
            text-decoration-thickness: 2px;
        }
        
        #introduction {
            color: var(--fg);
        }
    </style>
    
    <script>
        $(() => {
            $("#toggle-theme-button").click(() => {
                const link = $("#gruvbox-theme-link");
                let source = link.attr("href");
                source = source === "css/gruvbox.css" ? "css/gruvbox_light.css": "css/gruvbox.css";
                link.attr("href", source);
            });
        });
    </script>
</head>
<body>
<button id="toggle-theme-button"><i class="material-icons" id="toggle-theme-icon">brightness_low</i></button>
<div style="display: flex; justify-content: center">
    <div id="content-div">
        
        <div style="min-width: 0; flex-wrap: wrap; display: flex; flex-direction: row; align-items: baseline;">
            <h1 id="nickname-text">nedoxff</h1>
            <a class="section-button" href="https://www.youtube.com/watch?v=dQw4w9WgXcQ"><h3>info</h3></a>
            <a class="section-button" href="https://www.youtube.com/watch?v=dQw4w9WgXcQ"><h3>code</h3></a>
            <a class="section-button" href="https://www.youtube.com/watch?v=dQw4w9WgXcQ"><h3>art</h3></a>
            <a class="section-button" href="https://www.youtube.com/watch?v=dQw4w9WgXcQ"><h3>other</h3></a>
        </div>
        <hr style="color: var(--fg);">
        <h3 id="introduction">hi! i am nedo <i>(or nedoxff)</i>, a programmer living in belarus.<br> i like to code, sometimes draw, but generally im a <sub>dumbass.</sub><br>nice to meet you!</h3>
    </div>
</div>
</body>
</html>
